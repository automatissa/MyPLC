; ============================================================================
;  MyPLC — ESP32 PlatformIO Project
;
;  Upload:  pio run -t upload
;  Monitor: pio device monitor
; ============================================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200

; C++17 required for if constexpr, structured bindings, etc.
build_flags =
    -std=gnu++17
    -I${PROJECT_DIR}/../   ; expose plc/, config/, sim/ from the repo root

build_unflags = -std=gnu++11

; Unity build: one .cpp that includes all plc/ sources
build_src_filter = +<*> -<.git/>
